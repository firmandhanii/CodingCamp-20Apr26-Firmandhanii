<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>

  <!-- Google Fonts: Inter, Orbitron, Share Tech Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    /* =============================================
       CSS Custom Properties — Cyberpunk Base Theme
       ============================================= */
    body {
      --bg: #0a0a1a;
      --card-bg: #0d0d2b;
      --card-border: #00ffe1;
      --card-glow: 0 0 8px #00ffe1, 0 0 20px rgba(0,255,225,0.3);
      --text-primary: #e0f7fa;
      --text-muted: #607d8b;
      --accent: #00ffe1;
      --accent-text: #0a0a1a;
      --danger: #ff003c;
      --clock-glow: 0 0 10px #00ffe1, 0 0 20px #00ffe1;
      --timer-color: #ff003c;
      --timer-glow: 0 0 10px #ff003c;
      --btn-hover-glow: 0 0 8px #ffe600;
    }

    /* Dark Mode Variant */
    body.dark {
      --bg: #1a1a2e;
      --card-bg: #16213e;
      --card-border: #0f3460;
      --card-glow: none;
      --text-primary: #e0e0e0;
      --text-muted: #a0a0b0;
      --accent: #7c73e6;
      --accent-text: #ffffff;
      --danger: #e53935;
      --clock-glow: none;
      --timer-color: #7c73e6;
      --timer-glow: none;
      --btn-hover-glow: 0 0 8px #7c73e6;
    }

    /* =============================================
       Base Body Styles
       ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* =============================================
       Scanline Overlay (CRT Effect)
       ============================================= */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.03) 0px,
        rgba(0,0,0,0.03) 1px,
        transparent 1px,
        transparent 4px
      );
      z-index: 9999;
    }

    /* =============================================
       Dashboard Grid Layout
       ============================================= */
    .dashboard-grid {
      display: grid;
      grid-template-areas:
        "clock  clock"
        "timer  todo"
        "links  links";
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    #clock-widget  { grid-area: clock; }
    #timer-widget  { grid-area: timer; }
    #todo-widget   { grid-area: todo; }
    #links-widget  { grid-area: links; }

    /* =============================================
       Responsive Breakpoint — Single Column ≤768px
       ============================================= */
    @media (max-width: 768px) {
      .dashboard-grid {
        grid-template-areas:
          "clock"
          "timer"
          "todo"
          "links";
        grid-template-columns: 1fr;
      }
    }

    /* =============================================
       Card Styles
       ============================================= */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--card-glow);
    }

    /* =============================================
       Card Title Styles
       ============================================= */
    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    /* =============================================
       Button Base
       ============================================= */
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 16px;
      transition: box-shadow 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      box-shadow: var(--btn-hover-glow);
    }

    /* Primary Button — Cyan Neon Fill, Dark Text */
    .btn-primary {
      background: var(--accent);
      color: var(--accent-text);
      border: 1px solid var(--accent);
    }

    .btn-primary:hover {
      box-shadow: var(--btn-hover-glow);
    }

    /* Delete / Danger Button — Red Neon Fill, White Text */
    .btn-danger {
      background: var(--danger);
      color: #ffffff;
      border: 1px solid var(--danger);
    }

    .btn-danger:hover {
      box-shadow: var(--btn-hover-glow);
    }

    /* Secondary Button */
    .btn-secondary {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--card-border);
    }

    .btn-secondary:hover {
      box-shadow: var(--btn-hover-glow);
    }

    /* =============================================
       Text Input Styles — Neon Borders
       ============================================= */
    input[type="text"],
    input[type="url"],
    input[type="search"] {
      background: var(--card-bg);
      color: var(--text-primary);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: box-shadow 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    input[type="search"]:focus {
      box-shadow: 0 0 6px var(--accent);
    }

    input[type="text"]::placeholder,
    input[type="url"]::placeholder,
    input[type="search"]::placeholder {
      color: var(--text-muted);
    }

    /* =============================================
       Preloader
       ============================================= */
    #preloader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: opacity 0.6s ease;
    }

    .preloader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .preloader-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: var(--clock-glow);
      letter-spacing: 0.2em;
      margin-bottom: 2rem;
    }

    .preloader-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid transparent;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .preloader-bar-track {
      width: 200px;
      height: 4px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 2px;
      overflow: hidden;
      margin: 0 auto 1rem;
    }

    .preloader-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      animation: loadBar 2.5s linear forwards;
    }

    @keyframes loadBar {
      to { width: 100%; }
    }

    .preloader-text {
      color: var(--text-muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
    }

    .preloader-text::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
      100% { content: ''; }
    }

    /* =============================================
       Name Modal
       ============================================= */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9000;
    }

    .modal-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-glow);
      border-radius: 12px;
      padding: 2rem;
      width: min(400px, 90vw);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .modal-title {
      font-family: 'Orbitron', sans-serif;
      color: var(--accent);
      text-shadow: var(--clock-glow);
      letter-spacing: 0.15em;
      font-size: 1.1rem;
    }

    .modal-subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 0.5rem;
    }

    #name-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 6px var(--danger);
    }

    /* =============================================
       Clock Widget Styles
       ============================================= */
    #clock-widget {
      text-align: center;
    }

    #clock-time {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: var(--clock-glow);
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    #clock-date {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }

    .greeting-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    #clock-greeting {
      color: var(--text-primary);
      font-size: 1rem;
    }

    #greeting-edit {
      background: none;
      border: none;
      padding: 2px 4px;
      font-size: 0.85rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
      box-shadow: none;
    }

    #greeting-edit:hover {
      opacity: 1;
      box-shadow: none;
    }

    /* =============================================
       Theme Toggle Button
       ============================================= */
    #theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9998;
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    #theme-toggle:hover {
      box-shadow: var(--btn-hover-glow);
    }

    /* =============================================
       Focus Timer Widget Styles
       ============================================= */
    #timer-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: 4rem;
      color: var(--timer-color);
      text-shadow: var(--timer-glow);
      text-align: center;
      margin: 1rem 0;
      letter-spacing: 0.05em;
    }

    .timer-controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* =============================================
       To-Do List Widget Styles
       ============================================= */
    .todo-input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .todo-input-row input {
      flex: 1;
    }
    .todo-sort-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .sort-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    #todo-sort {
      background: var(--card-bg);
      color: var(--text-primary);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
    }
    #todo-sort:focus {
      box-shadow: 0 0 6px var(--accent);
    }
    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 300px;
      overflow-y: auto;
    }
    #todo-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    #todo-list li:last-child {
      border-bottom: none;
    }
    .todo-label {
      flex: 1;
      color: var(--text-primary);
      font-size: 0.9rem;
      word-break: break-word;
    }
    .todo-label.completed {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .todo-edit-input {
      flex: 1;
      background: var(--card-bg);
      color: var(--text-primary);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.9rem;
      outline: none;
    }
    .todo-edit-btn {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 4px 8px;
      font-size: 0.75rem;
      border-radius: 4px;
    }
    .todo-delete-btn {
      background: var(--danger);
      border: 1px solid var(--danger);
      color: #fff;
      padding: 4px 8px;
      font-size: 0.75rem;
      border-radius: 4px;
    }
    .todo-save-btn {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: var(--accent-text);
      padding: 4px 8px;
      font-size: 0.75rem;
      border-radius: 4px;
    }

    /* =============================================
       Quick Links Widget Styles
       ============================================= */
    .links-input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .links-input-row input {
      flex: 1;
      min-width: 120px;
    }
    #links-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .link-item {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    .link-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: box-shadow 0.2s ease, background 0.2s ease;
    }
    .link-btn:hover {
      background: var(--accent);
      color: var(--accent-text);
      box-shadow: var(--btn-hover-glow);
    }
    .link-remove {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .link-remove:hover {
      color: var(--danger);
      box-shadow: none;
    }

    /* =============================================
       Starfield Canvas — Dark Mode Only
       ============================================= */
    #starfield {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 1s ease;
    }

    body.dark #starfield {
      opacity: 1;
    }

    /* Lift dashboard grid above canvas */
    .dashboard-grid {
      position: relative;
      z-index: 1;
    }

    /* Fixed overlays (#preloader z-index:10000, #name-modal z-index:9000, #theme-toggle z-index:9998)
       already stack above canvas (z-index:0) — no override needed */
  </style>
</head>
<body>

  <!-- Starfield background canvas — visible in dark mode -->
  <canvas id="starfield"></canvas>

  <!-- Preloader — first child of body -->
  <div id="preloader">
    <div class="preloader-content">
      <div class="preloader-title">DASHBOARD</div>
      <div class="preloader-spinner"></div>
      <div class="preloader-bar-track">
        <div class="preloader-bar-fill"></div>
      </div>
      <div class="preloader-text">Initializing</div>
    </div>
  </div>

  <!-- Name Modal — centered overlay for name entry -->
  <div id="name-modal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <h2 class="modal-title">IDENTIFY YOURSELF</h2>
      <p class="modal-subtitle">Enter your name to personalize your dashboard</p>
      <input id="name-input" type="text" maxlength="30" placeholder="Your name…" autocomplete="off">
      <div class="modal-actions">
        <button id="name-save" class="btn-primary">Save</button>
        <button id="name-skip" class="btn-secondary">Skip</button>
      </div>
    </div>
  </div>

  <!-- Theme Toggle — fixed top-right -->
  <button id="theme-toggle" title="Toggle dark mode">🌙</button>

  <!-- Dashboard Grid -->
  <div class="dashboard-grid">
    <div id="clock-widget" class="card">
      <h2 class="card-title">SYSTEM CLOCK</h2>
      <div id="clock-time">00:00:00</div>
      <div id="clock-date">Loading...</div>
      <div class="greeting-row">
        <span id="clock-greeting">Good Morning</span>
        <button id="greeting-edit" title="Edit name">✏️</button>
      </div>
    </div>
    <div id="timer-widget" class="card">
      <h2 class="card-title">FOCUS TIMER</h2>
      <div id="timer-display">25:00</div>
      <div class="timer-controls">
        <button id="timer-start" class="btn-primary">Start</button>
        <button id="timer-stop" class="btn-secondary">Stop</button>
        <button id="timer-reset" class="btn-secondary">Reset</button>
      </div>
    </div>
    <div id="todo-widget" class="card">
      <h2 class="card-title">TASKS</h2>
      <div class="todo-input-row">
        <input id="todo-input" type="text" placeholder="New task…">
        <button id="todo-add" class="btn-primary">Add</button>
      </div>
      <div class="todo-sort-row">
        <label for="todo-sort" class="sort-label">Sort by:</label>
        <select id="todo-sort">
          <option value="default">Default</option>
          <option value="az">A–Z</option>
          <option value="za">Z–A</option>
          <option value="done-last">Done Last</option>
          <option value="done-first">Done First</option>
        </select>
      </div>
      <ul id="todo-list"></ul>
    </div>
    <div id="links-widget" class="card">
      <h2 class="card-title">QUICK LINKS</h2>
      <div class="links-input-row">
        <input id="link-name-input" type="text" placeholder="Link name">
        <input id="link-url-input" type="url" placeholder="https://…">
        <button id="link-add" class="btn-primary">Add Link</button>
      </div>
      <div id="links-list"></div>
    </div>
  </div>

  <script>
    // Dashboard JS — modules initialized here

    // =============================================
    // Timer state
    // =============================================
    let totalSeconds = 1500;
    let intervalId = null;

    // =============================================
    // Todo state
    // =============================================
    let tasks = [];
    let currentSort = 'default';

    // =============================================
    // Links state
    // =============================================
    let links = [];

    // =============================================
    // Preloader module
    // =============================================
    function initPreloader() {
      const preloader = document.getElementById('preloader');
      setTimeout(hidePreloader, 2500);
    }

    function hidePreloader() {
      const preloader = document.getElementById('preloader');
      preloader.style.opacity = '0';
      preloader.addEventListener('transitionend', () => {
        preloader.style.display = 'none';
      }, { once: true });
      // 700ms fallback guard in case transitionend doesn't fire
      setTimeout(() => {
        preloader.style.display = 'none';
      }, 700);
    }

    // =============================================
    // Starfield module
    // =============================================
    (function() {
      const canvas = document.getElementById('starfield');
      const ctx = canvas.getContext('2d');
      let stars = [];
      let rafId = null;
      const STAR_COUNT = 220;

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function randomBetween(a, b) {
        return a + Math.random() * (b - a);
      }

      function createStar() {
        return {
          x:       Math.random() * canvas.width,
          y:       Math.random() * canvas.height,
          radius:  randomBetween(0.4, 1.8),
          alpha:   randomBetween(0.3, 1),
          delta:   randomBetween(0.003, 0.012) * (Math.random() < 0.5 ? 1 : -1),
          color:   pickColor()
        };
      }

      function pickColor() {
        // Mostly white/blue-white, occasional warm or purple tint
        const palette = [
          'rgba(255,255,255,',
          'rgba(200,220,255,',
          'rgba(180,180,255,',
          'rgba(255,240,200,',
          'rgba(160,200,255,'
        ];
        return palette[Math.floor(Math.random() * palette.length)];
      }

      function initStars() {
        resize();
        stars = Array.from({ length: STAR_COUNT }, createStar);
      }

      function drawFrame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
          // Twinkle
          s.alpha += s.delta;
          if (s.alpha >= 1)   { s.alpha = 1;   s.delta = -Math.abs(s.delta); }
          if (s.alpha <= 0.1) { s.alpha = 0.1; s.delta =  Math.abs(s.delta); }

          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          ctx.fillStyle = s.color + s.alpha + ')';
          ctx.fill();

          // Soft glow for larger stars
          if (s.radius > 1.2) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = s.color + (s.alpha * 0.15) + ')';
            ctx.fill();
          }
        });
        rafId = requestAnimationFrame(drawFrame);
      }

      function startStarfield() {
        if (rafId) return;
        initStars();
        drawFrame();
      }

      function stopStarfield() {
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      window.addEventListener('resize', function() {
        if (rafId) { initStars(); }
      });

      // Expose control functions
      window.startStarfield = startStarfield;
      window.stopStarfield  = stopStarfield;
    })();

    // =============================================
    // Theme module
    // =============================================
    function initTheme() {
      const theme = localStorage.getItem('theme') ?? 'light';
      if (theme === 'dark') {
        document.body.classList.add('dark');
        startStarfield();
      }
      updateToggleIcon();
      document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      const theme = document.body.classList.contains('dark') ? 'dark' : 'light';
      localStorage.setItem('theme', theme);
      updateToggleIcon();
      if (theme === 'dark') {
        startStarfield();
      } else {
        stopStarfield();
      }
    }

    function updateToggleIcon() {
      const btn = document.getElementById('theme-toggle');
      // 🌙 = currently light (click to go dark), ☀️ = currently dark (click to go light)
      btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    }

    // =============================================
    // Name module
    // =============================================
    function getGreetingBase() {
      const hour = new Date().getHours();
      if (hour >= 5 && hour <= 11) return 'Good Morning';
      if (hour >= 12 && hour <= 17) return 'Good Afternoon';
      if (hour >= 18 && hour <= 21) return 'Good Evening';
      return 'Good Night';
    }

    function updateGreeting() {
      const name = localStorage.getItem('userName') ?? '';
      const base = getGreetingBase();
      const el = document.getElementById('clock-greeting');
      if (el) el.textContent = name ? `${base}, ${name}!` : base;
    }

    function openNameModal() {
      const input = document.getElementById('name-input');
      input.value = localStorage.getItem('userName') ?? '';
      input.classList.remove('error');
      document.getElementById('name-modal').style.display = 'flex';
    }

    function closeNameModal() {
      document.getElementById('name-modal').style.display = 'none';
    }

    function saveName() {
      const input = document.getElementById('name-input');
      const name = input.value.trim();
      if (!name) {
        input.classList.add('error');
        return;
      }
      localStorage.setItem('userName', name);
      closeNameModal();
      updateGreeting();
    }

    function skipName() {
      localStorage.setItem('userName', '');
      closeNameModal();
      updateGreeting();
    }

    function initName() {
      const userName = localStorage.getItem('userName');
      if (userName === null) {
        openNameModal();
      }
      document.getElementById('name-save').addEventListener('click', saveName);
      document.getElementById('name-skip').addEventListener('click', skipName);
      document.getElementById('name-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') saveName();
      });
    }

    // =============================================
    // Clock module
    // =============================================
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
      document.getElementById('clock-date').textContent = now.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      updateGreeting();
    }

    function initClock() {
      updateClock();
      setInterval(updateClock, 1000);
      document.getElementById('greeting-edit').addEventListener('click', openNameModal);
    }

    // =============================================
    // Timer module
    // =============================================
    function updateTimerDisplay() {
      const m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
      const s = String(totalSeconds % 60).padStart(2, '0');
      document.getElementById('timer-display').textContent = `${m}:${s}`;
    }

    function startTimer() {
      if (intervalId !== null) return; // guard against duplicate intervals
      intervalId = setInterval(tick, 1000);
    }

    function tick() {
      totalSeconds -= 1;
      updateTimerDisplay();
      if (totalSeconds <= 0) {
        stopTimer();
        alert('Focus session complete! Time to take a break.');
      }
    }

    function stopTimer() {
      clearInterval(intervalId);
      intervalId = null;
    }

    function resetTimer() {
      stopTimer();
      totalSeconds = 1500;
      updateTimerDisplay();
    }

    function initTimer() {
      updateTimerDisplay();
      document.getElementById('timer-start').addEventListener('click', startTimer);
      document.getElementById('timer-stop').addEventListener('click', stopTimer);
      document.getElementById('timer-reset').addEventListener('click', resetTimer);
    }

    // =============================================
    // Todo module
    // =============================================
    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem('dashboard_todos')) ?? [];
      } catch (e) {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem('dashboard_todos', JSON.stringify(tasks));
    }

    function getSortedTasks() {
      const copy = [...tasks];
      switch (currentSort) {
        case 'az':
          copy.sort((a, b) => a.text.localeCompare(b.text, undefined, { sensitivity: 'base' }));
          break;
        case 'za':
          copy.sort((a, b) => b.text.localeCompare(a.text, undefined, { sensitivity: 'base' }));
          break;
        case 'done-last':
          copy.sort((a, b) => {
            if (a.checked !== b.checked) return a.checked ? 1 : -1;
            return a.text.localeCompare(b.text, undefined, { sensitivity: 'base' });
          });
          break;
        case 'done-first':
          copy.sort((a, b) => {
            if (a.checked !== b.checked) return a.checked ? -1 : 1;
            return a.text.localeCompare(b.text, undefined, { sensitivity: 'base' });
          });
          break;
        default:
          break; // insertion order
      }
      return copy;
    }

    function renderTasks() {
      const list = document.getElementById('todo-list');
      const sorted = getSortedTasks();
      list.innerHTML = '';
      sorted.forEach(task => {
        const li = document.createElement('li');
        li.dataset.id = task.id;

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = task.checked;
        cb.dataset.action = 'toggle';

        const label = document.createElement('span');
        label.className = 'todo-label' + (task.checked ? ' completed' : '');
        label.textContent = task.text;

        const editBtn = document.createElement('button');
        editBtn.className = 'todo-edit-btn';
        editBtn.textContent = 'Edit';
        editBtn.dataset.action = 'edit';

        const delBtn = document.createElement('button');
        delBtn.className = 'todo-delete-btn';
        delBtn.textContent = 'Delete';
        delBtn.dataset.action = 'delete';

        li.appendChild(cb);
        li.appendChild(label);
        li.appendChild(editBtn);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    function setSort(value) {
      currentSort = value;
      localStorage.setItem('taskSort', value);
      renderTasks();
    }

    function addTask(text) {
      if (!text.trim()) return;
      tasks.push({ id: Date.now().toString(), text: text.trim(), checked: false });
      saveTasks();
      renderTasks();
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.checked = !task.checked;
        saveTasks();
        renderTasks();
      }
    }

    function editTask(id) {
      const li = document.querySelector(`#todo-list li[data-id="${id}"]`);
      if (!li) return;
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      const label = li.querySelector('.todo-label');
      const editBtn = li.querySelector('[data-action="edit"]');

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'todo-edit-input';
      input.value = task.text;

      const saveBtn = document.createElement('button');
      saveBtn.className = 'todo-save-btn';
      saveBtn.textContent = 'Save';
      saveBtn.dataset.action = 'save';

      li.replaceChild(input, label);
      li.replaceChild(saveBtn, editBtn);
      input.focus();

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') saveTask(id, input.value);
      });
    }

    function saveTask(id, newText) {
      const task = tasks.find(t => t.id === id);
      if (task && newText.trim()) {
        task.text = newText.trim();
      }
      saveTasks();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      renderTasks();
    }

    function initTodo() {
      tasks = loadTasks();
      currentSort = localStorage.getItem('taskSort') ?? 'default';
      const sortEl = document.getElementById('todo-sort');
      sortEl.value = currentSort;
      renderTasks();

      document.getElementById('todo-add').addEventListener('click', function() {
        const input = document.getElementById('todo-input');
        addTask(input.value);
        input.value = '';
      });

      document.getElementById('todo-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          addTask(this.value);
          this.value = '';
        }
      });

      sortEl.addEventListener('change', function() {
        setSort(this.value);
      });

      // Event delegation on #todo-list
      document.getElementById('todo-list').addEventListener('click', function(e) {
        const li = e.target.closest('li');
        if (!li) return;
        const id = li.dataset.id;
        const action = e.target.dataset.action;

        if (e.target.type === 'checkbox') {
          toggleTask(id);
        } else if (action === 'edit') {
          editTask(id);
        } else if (action === 'save') {
          const input = li.querySelector('.todo-edit-input');
          if (input) saveTask(id, input.value);
        } else if (action === 'delete') {
          deleteTask(id);
        }
      });
    }

    // =============================================
    // Links module
    // =============================================
    function loadLinks() {
      const raw = localStorage.getItem('dashboard_links');
      if (raw === null) {
        links = [
          { id: '1', name: 'Google', url: 'https://www.google.com' },
          { id: '2', name: 'Gmail', url: 'https://mail.google.com' },
          { id: '3', name: 'Calendar', url: 'https://calendar.google.com' }
        ];
        saveLinks();
      } else {
        try {
          links = JSON.parse(raw) ?? [];
        } catch (e) {
          links = [];
        }
      }
    }

    function saveLinks() {
      localStorage.setItem('dashboard_links', JSON.stringify(links));
    }

    function addLink(name, url) {
      if (!name.trim() || !url.trim()) return;
      links.push({ id: Date.now().toString(), name: name.trim(), url: url.trim() });
      saveLinks();
      renderLinks();
    }

    function removeLink(id) {
      links = links.filter(l => l.id !== id);
      saveLinks();
      renderLinks();
    }

    function openLink(url) {
      window.open(url, '_blank');
    }

    function renderLinks() {
      const container = document.getElementById('links-list');
      container.innerHTML = '';
      links.forEach(link => {
        const span = document.createElement('span');
        span.className = 'link-item';

        const btn = document.createElement('button');
        btn.className = 'link-btn';
        btn.textContent = link.name;
        btn.dataset.url = link.url;
        btn.dataset.action = 'open';

        const removeBtn = document.createElement('button');
        removeBtn.className = 'link-remove';
        removeBtn.textContent = '×';
        removeBtn.dataset.id = link.id;
        removeBtn.dataset.action = 'remove';
        removeBtn.title = `Remove ${link.name}`;

        span.appendChild(btn);
        span.appendChild(removeBtn);
        container.appendChild(span);
      });
    }

    function initLinks() {
      loadLinks();
      renderLinks();

      document.getElementById('link-add').addEventListener('click', function() {
        const nameInput = document.getElementById('link-name-input');
        const urlInput = document.getElementById('link-url-input');
        addLink(nameInput.value, urlInput.value);
        nameInput.value = '';
        urlInput.value = '';
      });

      // Event delegation on #links-list
      document.getElementById('links-list').addEventListener('click', function(e) {
        const action = e.target.dataset.action;
        if (action === 'open') {
          openLink(e.target.dataset.url);
        } else if (action === 'remove') {
          removeLink(e.target.dataset.id);
        }
      });
    }

    // =============================================
    // Initialisation
    // =============================================
    document.addEventListener('DOMContentLoaded', function() {
      initPreloader();
      initTheme();
      initName();
      initClock();
      initTimer();
      initTodo();
      initLinks();
    });
  </script>

</body>
</html>
